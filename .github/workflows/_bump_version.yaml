name: Bump Project Version

on:
  workflow_call:
    inputs:
      bump_type:
        description: 'Version bump type (patch, minor, major, dev, alpha, beta, rc, release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  bump-version:
    name: bump-version
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-24.04' }}
    steps:
      - name: Generate Auth Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          submodules: recursive

      - uses: ./shell/.shock/actions/envrc
      - uses: ./shell/.shock/actions/git-config

      - name: Plan Version Bump
        id: plan
        run: |
          args=(--dry-run)
          if [[ -n "${{ inputs.bump_type }}" ]]; then
            args+=("--${{ inputs.bump_type }}")
          fi
          VERSION=$(./shell/shock git-bump "${args[@]}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync Project Manifest
        run: ./shell/scripts/sync-version.sh "${{ steps.plan.outputs.version }}"

      - name: Commit Version Bump
        run: |
          ./shell/shock git-commit -a \
            -m "chore: bump to v${{ steps.plan.outputs.version }} [skip ci]"

      - name: Create Version Tag
        run: |
          git tag \
            -a "v${{ steps.plan.outputs.version }}" \
            -m "v${{ steps.plan.outputs.version }}"

      - name: Push changes and tags
        run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
