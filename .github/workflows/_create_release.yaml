name: Create Release

on:
  workflow_call:
    outputs:
      tag:
        description: The release tag (e.g. v0.0.1-dev.1)
        value: ${{ jobs.release.outputs.tag }}

jobs:
  build:
    name: build
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-24.04' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          submodules: recursive
      - uses: ./shell/.shock/actions/envrc
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: go build -o violet ./cmd/violet/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: violet-linux-amd64
          path: violet

  release:
    name: release
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-24.04' }}
    needs: build
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.publish.outputs.tag }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Generate Auth Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.generate-token.outputs.token }}
          submodules: recursive

      - uses: ./shell/.shock/actions/envrc

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: violet-linux-amd64

      - name: Create GitHub Release
        id: publish
        run: |
          TAG="v$(jq -r '.latest' manifest.json)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            violet
